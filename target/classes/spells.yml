# ============================================================
#  HAZORIA WANDS — Sorts
#  Actions  : RaytraceHit, Damage, PotionEffect, Shield
#  Effets   : particle, sound, trail
#  particle_target : caster (défaut) | target
#  trail    : même noms de particules que particle
#  trail_step      : espacement entre les points (défaut 0.4)
#  fallback_range  : distance si raté (défaut 12)
# ============================================================

# -------------------------------------------------------
# Protego — Bouclier magique
# -------------------------------------------------------
Protego:
  name: "Protego"
  description: "Crée un bouclier qui réduit les dégâts."
  parameters:
    mana: 20
    cooldown: 7000

  actions:
    cast:
      - class: Shield
        duration_ms: 3000
        damage_reduction: 0.6

  effects:
    cast:
      - sound: item.shield.block
        sound_pitch: 1.3
      - particle: spell
        particle_count: 30
        particle_offset_x: 0.5
        particle_offset_y: 1.0
        particle_offset_z: 0.5

# -------------------------------------------------------
# Stupefix — Assommoir
# -------------------------------------------------------
Stupefix:
  name: "Stupefix"
  description: "Ralentit et blesse la cible."
  parameters:
    mana: 15
    cooldown: 1500

  actions:
    cast:
      - class: RaytraceHit
        range: 12
      - class: Damage
        amount: 4
      - class: PotionEffect
        add_effects:
          slowness: 1
        duration: 3000
        target: target

  effects:
    cast:
      - sound: entity.player.attack.weak
        sound_pitch: 0.9
      - trail: smoke
        trail_step: 0.35
        particle_offset_x: 0.04
        particle_offset_y: 0.04
        particle_offset_z: 0.04
        fallback_range: 12
      - particle: smoke
        particle_count: 15
        particle_offset_x: 0.3
        particle_offset_y: 0.3
        particle_offset_z: 0.3
        particle_target: target

# -------------------------------------------------------
# AvadaKedavra — Malédiction de mort
# -------------------------------------------------------
AvadaKedavra:
  name: "Avada Kedavra"
  description: "Inflige des dégâts massifs et affaiblit la cible."
  parameters:
    mana: 60
    cooldown: 30000

  actions:
    cast:
      - class: RaytraceHit
        range: 20
      - class: Damage
        amount: 18
      - class: PotionEffect
        add_effects:
          wither: 1
        duration: 3000
        target: target

  effects:
    cast:
      - sound: entity.wither.shoot
        sound_pitch: 0.7
        sound_volume: 1.5
      - trail: dragon
        trail_step: 0.3
        particle_offset_x: 0.05
        particle_offset_y: 0.05
        particle_offset_z: 0.05
        fallback_range: 20
      - particle: dragon
        particle_count: 60
        particle_offset_x: 0.6
        particle_offset_y: 1.0
        particle_offset_z: 0.6
        particle_target: target
      - particle: portal
        particle_count: 40
        particle_offset_x: 0.4
        particle_offset_y: 0.5
        particle_offset_z: 0.4
        particle_target: target

# -------------------------------------------------------
# Incendio — Jet de flammes
# -------------------------------------------------------
Incendio:
