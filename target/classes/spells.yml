        sound_volume: 1.2
      - trail: flame
        trail_step: 0.25
        particle_offset_x: 0.03
        particle_offset_y: 0.03
        particle_offset_z: 0.03
        fallback_range: 15
      - particle: flame
        particle_count: 50
        particle_offset_x: 0.5
        particle_offset_y: 1.0
        particle_offset_z: 0.5
        particle_target: target
      - particle: lava
        particle_count: 8
        particle_offset_x: 0.3
        particle_offset_y: 0.8
        particle_offset_z: 0.3
        particle_target: target

